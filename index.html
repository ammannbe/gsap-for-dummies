<head>

    <title>GSAP</title>

    <link rel="stylesheet" href="./style.css">

    <style>
        .links {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin: 40px 0;
        }

        .links a {
            text-decoration: none;
            color: #333;
            font-size: 1.2rem;

            background-color: #333;
            color: white;
        }
    </style>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GSAP</title>

    <link rel="stylesheet" href="./style.css">

    <style>
        .links {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin: 40px 0;
        }

        .links a {
            text-decoration: none;
            color: #333;
            font-size: 1.2rem;
            border: 2px solid #333;
            padding: 10px 20px;
            border-radius: 5px;
            transition: background-color 0.3s, color 0.3s;
        }

        .links a:hover {
            background-color: #333;
            color: white;
        }
    </style>


    <script src="https://cdn.jsdelivr.net/npm/gsap@3.15/dist/gsap.min.js"></script>
    <script src="https://unpkg.com/@barba/core"></script>
    <!-- <script src="./barba.js"></script> -->

</head>

<body data-barba="wrapper">
    <div data-barba-transition></div>

    <header>
        <h1>GSAP ScrollTrigger Example</h1>
    </header>

    <main data-barba="container" data-barba-namespace="base">
        <div class="links">
            <h2>Animations:</h2>
            <a href="./horizontal-scrolling.html">Horizontal Scrolling</a>
            <a href="./slidein-stagger.html">Slide-in Stagger</a>
            <a href="./sticky-scroll.html">Sticky Scroll</a>
            <a href="./canvas3d.html">Canvas 3D</a>
            <a href="./sticky-scroll3d.html">Sticky Scroll 3D</a>
        </div>
    </main>

    <footer>
        Footer Content
    </footer>
</body>

</html>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GSAP Horizontal Scroll</title>

    <link rel="stylesheet" href="./style.css">

    <style>
        .container {
            height: 100vh;
            overflow: hidden;
            background: #eee;
            display: flex;
            align-items: center;

            padding: 20px;
        }

        .wrapper {
            display: flex;
            gap: 20px;
            width: 100%;
            height: 100%;
            overflow: hidden;
            position: relative;
        }

        .wrapper > * {
            width: 100%;
        }

        @media screen and (max-width: 1024px) and (orientation: portrait) {
            .wrapper {
                flex-direction: column;
            }
        }

        .images {
            position: relative;
            height: 100%;
        }

        @media screen and (max-width: 1024px) and (orientation: portrait) {
            .images {
                height: auto;
                aspect-ratio: 16/9;
            }
        }

        .image {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            background-color: #ccc;
            border-radius: 10px;
        }

        .image:not(:first-child) {
            opacity: 0;
        }

        .panelsWrapper {
            max-height: 100%;
            overflow: hidden;
        }

        .panels {
            display: flex;
            flex-direction: column;
            gap: 20px;
            will-change: transform;

        }

        .panel {
            width: 100%;
            height: 400px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;

            opacity: 0.3;
        }

        .panel1 {
            height: 200px;
        }

        .panel3 {
            height: 600px;
        }

        .panel6 {
            height: 100px;
        }
    </style>
</head>

<body>

    <header>
        <h1>GSAP ScrollTrigger Example</h1>
        <div class="empty">
            This is the header content. Scroll down to see the panels in action.
        </div>
    </header>

    <main>
        <div class="container container1" data-gsap="sticky-scroll">
            <div class="wrapper" data-gsap-sticky-scroll="wrapper">
                <div class="images" data-gsap-sticky-scroll="images">
                    <img class="image image1" src="https://picsum.photos/1500/2000?v1" alt="image-1">
                    <img class="image image2" src="https://picsum.photos/1500/2000?v2" alt="image-2">
                    <img class="image image3" src="https://picsum.photos/1500/2000?v3" alt="image-3">
                    <img class="image image4" src="https://picsum.photos/1500/2000?v4" alt="image-4">
                    <img class="image image5" src="https://picsum.photos/1500/2000?v5" alt="image-5">
                    <img class="image image6" src="https://picsum.photos/1500/2000?v6" alt="image-6">
                </div>

                <div class="panelsWrapper">
                    <div class="panels" data-gsap-sticky-scroll="content">
                        <section class="panel panel1">Panel 1</section>
                        <section class="panel panel2">Panel 2</section>
                        <section class="panel panel3">Panel 3</section>
                        <section class="panel panel4">Panel 4</section>
                        <section class="panel panel5">Panel 5</section>
                        <section class="panel panel6">Panel 6</section>
                    </div>
                </div>
            </div>
        </div>

        <div class="empty">Middle content</div>

    </main>

    <footer>
        Footer Content
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.15/dist/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.15/dist/ScrollTrigger.min.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            gsap.registerPlugin(ScrollTrigger);

            document.querySelectorAll('[data-gsap="sticky-scroll"]').forEach((container) => {
                const wrapper = container.querySelectorAll('[data-gsap-sticky-scroll="wrapper"]');
                const imageContainer = container.querySelectorAll('[data-gsap-sticky-scroll="images"]');
                const images = container.querySelectorAll('[data-gsap-sticky-scroll="images"] > *');
                const content = container.querySelector('[data-gsap-sticky-scroll="content"]');
                const items = content.querySelectorAll('[data-gsap-sticky-scroll="content"] > *');

                const tl = gsap.timeline({
                    scrollTrigger: {
                        trigger: container,
                        start: 'top top',
                        end: '+=' + (content.offsetHeight * 2),
                        scrub: 1,
                        pin: true,
                        invalidateOnRefresh: true,
                        markers: true
                    }
                });

                let moveY = 0;
                items.forEach((item, index) => {
                    const gap = parseFloat(getComputedStyle(content).gap) || 0;

                    moveY += items[index - 1]
                        ? items[index - 1].offsetHeight + gap
                        : 0;

                    tl.to(content, {
                        y: moveY * -1,
                        duration: 0.2,
                        ease: 'none',
                    }, index);

                    tl.to(item, {
                        opacity: 1,
                        duration: 0.6
                    }, index);

                    tl.to(images, {
                        opacity: (i) => i === index ? 1 : 0,
                        duration: 0.4
                    }, index);
                });
            });
        });
    </script>
</body>

</html>

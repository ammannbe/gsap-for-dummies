<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Canvas 3D</title>

    <link rel="stylesheet" href="./style.css">

    <style>
        .container {
            height: 5000px;
        }

        .container canvas {
            position: fixed;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            width: 50vw;
            min-width: 500px;
        }

        .wrapper {
            height: 100%;
        }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.15/dist/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.15/dist/ScrollTrigger.min.js"></script>

    <script src="https://unpkg.com/@barba/core"></script>
    <!-- <script src="./barba.js"></script> -->

    <script>
        function initCanvas3d(container, content, canvas, url, framecount, framelength) {
            const context = canvas.getContext('2d');

            function render(context, canvas, image) {
                context.clearRect(0, 0, canvas.width, canvas.height);
                context.drawImage(image, 0, 0);
            }

            function initload(img) {
                // Set canvas context size based on the specified image
                canvas.width = img.width;
                canvas.height = img.height;

                gsap.to(frames, {
                    frame: framecount - 1,
                    snap: 'frame',
                    scrollTrigger: {
                        trigger: container,
                        start: 'top top',
                        end: '+=' + content.offsetHeight,
                        scrub: 1,
                        invalidateOnRefresh: true,
                        markers: true,
                    },
                    onUpdate: () => render(context, canvas, images[frames.frame]),
                });
            }


            const images = []
            const frames = { frame: 0 };

            for (let i = 0; i < framecount; i++) {
                const img = new Image();

                if (i === (framecount - 1)) {
                    img.onload = () => initload(img);
                }

                img.src = url.replace('{frame}', (i + 1).toString().padStart(framelength, '0'));
                images.push(img);
            }
        }


        document.addEventListener('DOMContentLoaded', () => {
            gsap.registerPlugin(ScrollTrigger);

            const container = document.querySelector('[data-gsap="canvas3d"]');
            const content = container.querySelector('[data-gsap-canvas3d="content"]');
            const canvas = container.querySelector('[data-gsap-canvas3d="canvas"]');

            const url = canvas.dataset.gsapCanvas3dUrl;
            const framecount = canvas.dataset.gsapCanvas3dFramecount;
            const framelength = canvas.dataset.gsapCanvas3dFramelength;

            initCanvas3d(container, content, canvas, url, framecount, framelength);
        });
    </script>

</head>

<body data-barba="wrapper">
    <div data-barba-transition></div>

    <header>
        <nav>
            <a href="./index.html">HOME</a>
        </nav>

        <h1>Canvas 3D</h1>
    </header>

    <main data-barba="container" data-barba-namespace="base">
        <div id="one" class="container container1" data-gsap="canvas3d">
            <div class="wrapper" data-gsap-canvas3d="content">
                <canvas
                    data-gsap-canvas3d="canvas"
                    data-gsap-canvas3d-url="https://www.apple.com/105/media/us/airpods-pro/2019/1299e2f5_9206_4470_b28e_08307a42f19b/anim/sequence/large/01-hero-lightpass/{frame}.jpg"
                    data-gsap-canvas3d-framecount="147"
                    data-gsap-canvas3d-framelength="4"
                ></canvas>
            </div>
        </div>
    </main>

    <footer>
        Footer Content
    </footer>

</body>

</html>
